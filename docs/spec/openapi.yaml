          x-stainless-const: true
        allowed_tools:
          $ref: '#/components/schemas/OpenAI.ChatCompletionAllowedTools'
      description: Constrains the tools available to the model to a pre-defined set.
      title: Allowed tools
    OpenAI.ChatCompletionFunctionCallOption:
