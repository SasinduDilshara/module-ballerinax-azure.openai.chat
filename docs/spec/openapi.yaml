              ```json
              [
                { "type": "function", "function": { "name": "get_weather" } },
                { "type": "function", "function": { "name": "get_time" } }
              ]
              ```
      description: Constrains the tools available to the model to a pre-defined set.
      title: Allowed tools
    OpenAI.ChatCompletionAllowedToolsChoice:
      type: object
      required:
