openapi: 3.0.0
info:
  title: Azure AI Foundry Models Service
  license:
    name: MIT
    url: https://github.com/openai/openai-openapi/blob/master/LICENSE
  version: v1
tags:
- name: Batch
- name: Chat
- name: Completions
- name: Containers
- name: Conversations
- name: Evals
- name: Files
- name: Embeddings
- name: Fine-tuning
- name: Models
- name: Realtime
- name: Responses
- name: Threads
- name: Vector Stores
paths:
  /chat/completions:
    post:
      operationId: createChatCompletion
      description: Creates a chat completion.
      parameters:
      - name: api-version
        in: query
        required: false
        description: |-
          The explicit Azure AI Foundry Models API version to use for this request.
          `v1` if not otherwise specified.
        schema:
          $ref: '#/components/schemas/AzureAIFoundryModelsApiVersion'
          default: v1
      responses:
        '200':
          description: The request has succeeded.
          headers:
            apim-request-id:
              required: false
              description: A request ID used for troubleshooting purposes.
              schema:
                type: string
          content:
            application/json:
              schema:
                anyOf:
                - type: object
                  required:
                  - id
                  - choices
                  - created
                  - model
                  - object
                  properties:
                    id:
                      type: string
                      description: A unique identifier for the chat completion.
                    choices:
                      type: array
                      items:
                        $ref: '#/components/schemas/OpenAI.CreateChatCompletionResponseChoices'
                      description: A list of chat completion choices. Can be more than one if `n` is greater than 1.
                    created:
                      type: integer
                      format: unixtime
                      description: The Unix timestamp (in seconds) of when the chat completion was created.
                    model:
                      type: string
                      description: The model used for the chat completion.
                    system_fingerprint:
                      type: string
                      description: |-
                        This fingerprint represents the backend configuration that the model runs with.
                          Can be used in conjunction with the `seed` request parameter to understand when backend changes have been made that might impact determinism.
                      deprecated: true
                    object:
                      type: string
                      enum:
                      - chat.completion
                      description: The object type, which is always `chat.completion`.
                      x-stainless-const: true
                    usage:
                      $ref: '#/components/schemas/OpenAI.CompletionUsage'
                    prompt_filter_results:
                      type: array
                      items:
                        type: object
                        properties:
                          prompt_index:
                            type: integer
                            format: int32
                            description: The index of the input prompt that this content filter result corresponds to.
                          content_filter_results:
                            allOf:
                            - $ref: '#/components/schemas/AzureContentFilterResultForPrompt'
                            description: The content filter results associated with the indexed input prompt.
                        required:
                        - prompt_index
                        - content_filter_results
                - type: object
                  required:
                  - id
                  - choices
                  - created
                  - model
                  - object
                  properties:
                    id:
                      type: string
                      description: A unique identifier for the chat completion. Each chunk has the same ID.
                    choices:
                      type: array
                      items:
                        $ref: '#/components/schemas/OpenAI.CreateChatCompletionStreamResponseChoices'
                      description: |-
                        A list of chat completion choices. Can contain more than one elements if `n` is greater than 1. Can also be empty for the
                          last chunk if you set `stream_options: {"include_usage": true}`.
                    created:
                      type: integer
                      format: unixtime
                      description: The Unix timestamp (in seconds) of when the chat completion was created. Each chunk has the same timestamp.
                    model:
                      type: string
                      description: The model to generate the completion.
                    system_fingerprint:
                      type: string
                      description: |-
                        This fingerprint represents the backend configuration that the model runs with.
                          Can be used in conjunction with the `seed` request parameter to understand when backend changes have been made that might impact determinism.
                      deprecated: true
                    object:
                      type: string
                      enum:
                      - chat.completion.chunk
                      description: The object type, which is always `chat.completion.chunk`.
                      x-stainless-const: true
                    usage:
                      allOf:
                      - $ref: '#/components/schemas/OpenAI.CompletionUsage'
                      description: |-
                        An optional field that will only be present when you set
                          `stream_options: {"include_usage": true}` in your request. When present, it
                          contains a null value **except for the last chunk** which contains the
                          token usage statistics for the entire request.
                        *NOTE:** If the stream is interrupted or cancelled, you may not
                          receive the final usage chunk which contains the total token usage for
                          the request.
                    delta:
                      $ref: '#/components/schemas/OpenAI.ChatCompletionStreamResponseDelta'
                    content_filter_results:
                      $ref: '#/components/schemas/AzureContentFilterResultForChoice'
        default:
          description: An unexpected error response.
          headers:
            apim-request-id:
              required: false
              description: A request ID used for troubleshooting purposes.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    nullable: true
                  message:
                    type: string
                  param:
                    type: string
                    nullable: true
                  type:
                    type: string
                  inner_error: {}
                required:
                - code
                - message
      tags:
      - Chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                metadata:
                  $ref: '#/components/schemas/OpenAI.Metadata'
                  nullable: true
                top_logprobs:
                  type: integer
                  nullable: true
                temperature:
                  default: 1
                  type: number
                  nullable: true
                top_p:
                  default: 1
                  type: number
                  nullable: true
                user:
                  type: string
                  description: |-
                    A unique identifier representing your end-user, which can help to
                    monitor and detect abuse.
                  deprecated: true
                safety_identifier:
                  type: string
                  maxLength: 64
                  description: |-
                    A stable identifier used to help detect users of your application that may be violating OpenAI's usage policies.
                      The IDs should be a string that uniquely identifies each user, with a maximum length of 64 characters. We recommend hashing their username or email address, in order to avoid sending us any identifying information. [Learn more](/docs/guides/safety-best-practices#safety-identifiers).
                prompt_cache_key:
                  type: string
                  description: Used by OpenAI to cache responses for similar requests to optimize your cache hit rates. Replaces the `user` field. [Learn more](/docs/guides/prompt-caching).
                prompt_cache_retention:
                  type: string
                  enum:
                  - in_memory
                  - 24h
                  nullable: true
                messages:
                  type: array
                  items:
                    $ref: '#/components/schemas/OpenAI.ChatCompletionRequestMessage'
                  minItems: 1
                  description: |-
                    A list of messages comprising the conversation so far. Depending on the
                    model you use, different message types (modalities) are supported,
                    like text, images, and audio.
                model:
                  type: string
                  description: |-
                    Model ID used to generate the response, like `gpt-4o` or `o3`. OpenAI
                      offers a wide range of models with different capabilities, performance
                      characteristics, and price points. Refer to the [model guide](/docs/models)
                      to browse and compare available models.
                modalities:
                  $ref: '#/components/schemas/OpenAI.ResponseModalities'
                verbosity:
                  $ref: '#/components/schemas/OpenAI.Verbosity'
                reasoning_effort:
                  $ref: '#/components/schemas/OpenAI.ReasoningEffort'
                max_completion_tokens:
                  description: |-
                    An upper bound for the number of tokens that can be generated for a
                    completion, including visible output tokens and reasoning tokens.
                  type: integer
                  nullable: true
                frequency_penalty:
                  minimum: -2
                  maximum: 2
                  description: |-
                    Number between -2.0 and 2.0. Positive values penalize new tokens based on
                      their existing frequency in the text so far, decreasing the model's
                      likelihood to repeat the same line verbatim.
                  type: number
                  nullable: true
                presence_penalty:
                  minimum: -2
                  maximum: 2
                  description: |-
                    Number between -2.0 and 2.0. Positive values penalize new tokens based on
                      whether they appear in the text so far, increasing the model's likelihood
                      to talk about new topics.
                  type: number
                  nullable: true
                response_format:
                  allOf:
                  - $ref: '#/components/schemas/OpenAI.CreateChatCompletionRequestResponseFormat'
                  description: |-
                    An object specifying the format that the model must output.

                    Setting to `{ "type": "json_schema", "json_schema": {...} }` enables
                    Structured Outputs which ensures the model will match your supplied JSON
                    schema.

                    Setting to `{ "type": "json_object" }` enables JSON mode, which ensures
                    the message the model generates is valid JSON.

                    **Important:** when using JSON mode, you **must** also instruct the model
                    to produce JSON yourself via a system or user message. Without this, the
                    model may generate an unending stream of whitespace until the generation
                    reaches the token limit, resulting in a long-running and seemingly "stuck"
                    request. Also note that the message content may be partially cut off if
                    `finish_reason="length"`, which indicates the generation exceeded
                    `max_tokens` or the conversation exceeded the max context length.
                audio:
                  description: |-
                    Parameters for audio output. Required when audio output is requested with
                    `modalities: ["audio"]`.
                  $ref: '#/components/schemas/OpenAI.CreateChatCompletionRequestAudio'
                  nullable: true
                store:
                  description: |-
                    Whether or not to store the output of this chat completion request for
                    use in model distillation or evals products.
                  type: boolean
                  nullable: true
                stream:
                  description: |-
                    If set to true, the model response data will be streamed to the client
                    as it is generated using server-sent events.
                  type: boolean
                  nullable: true
                stop:
                  $ref: '#/components/schemas/OpenAI.StopConfiguration'
                  nullable: true
                logit_bias:
                  description: |-
                    Modify the likelihood of specified tokens appearing in the completion.
                      Accepts a JSON object that maps tokens (specified by their token ID in the
                      tokenizer) to an associated bias value from -100 to 100. Mathematically,
                      the bias is added to the logits generated by the model prior to sampling.
                      The exact effect will vary per model, but values between -1 and 1 should
                      decrease or increase likelihood of selection; values like -100 or 100
                      should result in a ban or exclusive selection of the relevant token.
                  x-oaiTypeLabel: map
                  type: object
                  nullable: true
                logprobs:
                  description: |-
                    Whether to return log probabilities of the output tokens or not. If true,
                      returns the log probabilities of each output token returned in the
                      `content` of `message`.
                  type: boolean
                  nullable: true
                max_tokens:
                  description: |-
                    The maximum number of tokens that can be generated in the chat completion.
                    This value can be used to control costs for text generated via API.

                    This value is now deprecated in favor of `max_completion_tokens`, and is
                    not compatible with o1 series models.
                  deprecated: true
                  type: integer
                  nullable: true
                'n':
                  minimum: 1
                  maximum: 128
                  description: How many chat completion choices to generate for each input message. Note that you will be charged based on the number of generated tokens across all of the choices. Keep `n` as `1` to minimize costs.
                  default: 1
                  type: integer
                  nullable: true
                prediction:
                  description: |-
                    Configuration for a predicted output, which can greatly improve
                    response times when large parts of the model response are known
                    ahead of time. This is most common when you are regenerating a
                    file with only minor changes to most of the content.
                  $ref: '#/components/schemas/OpenAI.PredictionContent'
                  nullable: true
                seed:
                  description: |-
                    This feature is in Beta.
                      If specified, our system will make a best effort to sample deterministically, such that repeated requests with the same `seed` and parameters should return the same result.
                      Determinism is not guaranteed, and you should refer to the `system_fingerprint` response parameter to monitor changes in the backend.
                  deprecated: true
                  x-oaiMeta:
                    beta: true
                  type: integer
                  format: int64
                  nullable: true
                stream_options:
                  $ref: '#/components/schemas/OpenAI.ChatCompletionStreamOptions'
                  nullable: true
                tools:
                  type: array
                  items:
                    anyOf:
                    - $ref: '#/components/schemas/OpenAI.ChatCompletionTool'
                    - $ref: '#/components/schemas/OpenAI.CustomToolChatCompletions'
                  description: |-
                    A list of tools the model may call. You can provide either
                      [custom tools](/docs/guides/function-calling#custom-tools) or
                      [function tools](/docs/guides/function-calling).
                tool_choice:
                  $ref: '#/components/schemas/OpenAI.ChatCompletionToolChoiceOption'
                parallel_tool_calls:
                  type: boolean
                  description: Whether to enable [parallel function calling](/docs/guides/function-calling#configuring-parallel-function-calling) during tool use.
                  default: true
                function_call:
                  oneOf:
                  - type: string
                    enum:
                    - none
                    - auto
                  - $ref: '#/components/schemas/OpenAI.ChatCompletionFunctionCallOption'
                  description: |-
                    Deprecated in favor of `tool_choice`.
                      Controls which (if any) function is called by the model.
                      `none` means the model will not call a function and instead generates a
                      message.
                      `auto` means the model can pick between generating a message or calling a
                      function.
                      Specifying a particular function via `{"name": "my_function"}` forces the
                      model to call that function.
                      `none` is the default when no functions are present. `auto` is the default
                      if functions are present.
                  deprecated: true
                functions:
                  type: array
                  items:
                    $ref: '#/components/schemas/OpenAI.ChatCompletionFunctions'
                  minItems: 1
                  maxItems: 128
                  description: |-
                    Deprecated in favor of `tools`.
                      A list of functions the model may generate JSON inputs for.
                  deprecated: true
                user_security_context:
                  $ref: '#/components/schemas/AzureUserSecurityContext'
              required:
              - messages
              - model
      x-ms-examples:
        Create a chat completion:
          $ref: ./examples/chat_completions.yaml
security:
- ApiKeyAuth: []
- ApiKeyAuth_: []
- OAuth2Auth:
  - https://cognitiveservices.azure.com/.default
components:
  schemas:
    AzureAIFoundryModelsApiVersion:
      type: string
      enum:
      - v1
      - preview
    AzureContentFilterBlocklistResult:
      type: object
      required:
      - filtered
      properties:
        filtered:
          type: boolean
          description: A value indicating whether any of the detailed blocklists resulted in a filtering action.
        details:
          type: array
          items:
            type: object
            properties:
              filtered:
                type: boolean
                description: A value indicating whether the blocklist produced a filtering action.
              id:
                type: string
                description: The ID of the custom blocklist evaluated.
            required:
            - filtered
            - id
          description: The pairs of individual blocklist IDs and whether they resulted in a filtering action.
      description: A collection of true/false filtering results for configured custom blocklists.
    AzureContentFilterCompletionTextSpan:
      type: object
      required:
      - completion_start_offset
      - completion_end_offset
      properties:
        completion_start_offset:
          type: integer
          format: int32
          description: Offset of the UTF32 code point which begins the span.
        completion_end_offset:
          type: integer
          format: int32
          description: Offset of the first UTF32 code point which is excluded from the span. This field is always equal to completion_start_offset for empty spans. This field is always larger than completion_start_offset for non-empty spans.
      description: A representation of a span of completion text as used by Azure OpenAI content filter results.
    AzureContentFilterCompletionTextSpanDetectionResult:
      type: object
      required:
      - filtered
      - detected
      - details
      properties:
        filtered:
          type: boolean
          description: Whether the content detection resulted in a content filtering action.
        detected:
          type: boolean
          description: Whether the labeled content category was detected in the content.
        details:
          type: array
          items:
            $ref: '#/components/schemas/AzureContentFilterCompletionTextSpan'
          description: Detailed information about the detected completion text spans.
    AzureContentFilterCustomTopicResult:
      type: object
      required:
      - filtered
      properties:
        filtered:
          type: boolean
          description: A value indicating whether any of the detailed topics resulted in a filtering action.
        details:
          type: array
          items:
            type: object
            properties:
              detected:
                type: boolean
                description: A value indicating whether the topic is detected.
              id:
                type: string
                description: The ID of the custom topic evaluated.
            required:
            - detected
            - id
          description: The pairs of individual topic IDs and whether they are detected.
      description: A collection of true/false filtering results for configured custom topics.
    AzureContentFilterDetectionResult:
      type: object
      required:
      - filtered
      - detected
      properties:
        filtered:
          type: boolean
          description: Whether the content detection resulted in a content filtering action.
        detected:
          type: boolean
          description: Whether the labeled content category was detected in the content.
      description: |-
        A labeled content filter result item that indicates whether the content was detected and whether the content was
        filtered.
    AzureContentFilterPersonallyIdentifiableInformationResult:
      type: object
      properties:
        redacted_text:
          type: string
          description: The redacted text with PII information removed or masked.
        sub_categories:
          type: array
          items:
            $ref: '#/components/schemas/AzurePiiSubCategoryResult'
          description: Detailed results for individual PIIHarmSubCategory(s).
      allOf:
      - $ref: '#/components/schemas/AzureContentFilterDetectionResult'
      description: A content filter detection result for Personally Identifiable Information that includes harm extensions.
    AzureContentFilterResultForChoice:
      type: object
      properties:
        sexual:
          allOf:
          - $ref: '#/components/schemas/AzureContentFilterSeverityResult'
          description: |-
            A content filter category for language related to anatomical organs and genitals, romantic relationships, acts
            portrayed in erotic or affectionate terms, pregnancy, physical sexual acts, including those portrayed as an
            assault or a forced sexual violent act against one's will, prostitution, pornography, and abuse.
        hate:
          allOf:
          - $ref: '#/components/schemas/AzureContentFilterSeverityResult'
          description: |-
            A content filter category that can refer to any content that attacks or uses pejorative or discriminatory
            language with reference to a person or identity group based on certain differentiating attributes of these groups
            including but not limited to race, ethnicity, nationality, gender identity and expression, sexual orientation,
            religion, immigration status, ability status, personal appearance, and body size.
        violence:
          allOf:
          - $ref: '#/components/schemas/AzureContentFilterSeverityResult'
          description: |-
            A content filter category for language related to physical actions intended to hurt, injure, damage, or kill
            someone or something; describes weapons, guns and related entities, such as manufactures, associations,
            legislation, and so on.
        self_harm:
          allOf:
          - $ref: '#/components/schemas/AzureContentFilterSeverityResult'
          description: |-
            A content filter category that describes language related to physical actions intended to purposely hurt, injure,
            damage one's body or kill oneself.
        profanity:
          allOf:
          - $ref: '#/components/schemas/AzureContentFilterDetectionResult'
          description: |-
            A detection result that identifies whether crude, vulgar, or otherwise objection language is present in the
            content.
        custom_blocklists:
          allOf:
          - $ref: '#/components/schemas/AzureContentFilterBlocklistResult'
          description: A collection of binary filtering outcomes for configured custom blocklists.
        custom_topics:
          allOf:
          - $ref: '#/components/schemas/AzureContentFilterCustomTopicResult'
          description: A collection of binary filtering outcomes for configured custom topics.
        error:
          type: object
          properties:
            code:
              type: integer
              format: int32
              description: A distinct, machine-readable code associated with the error.
            message:
              type: string
              description: A human-readable message associated with the error.
          required:
          - code
          - message
          description: If present, details about an error that prevented content filtering from completing its evaluation.
        protected_material_text:
          allOf:
          - $ref: '#/components/schemas/AzureContentFilterDetectionResult'
          description: A detection result that describes a match against text protected under copyright or other status.
        protected_material_code:
          type: object
          properties:
            filtered:
              type: boolean
              description: Whether the content detection resulted in a content filtering action.
            detected:
              type: boolean
              description: Whether the labeled content category was detected in the content.
            citation:
              type: object
              properties:
                license:
                  type: string
                  description: The name or identifier of the license associated with the detection.
                URL:
                  type: string
                  format: uri
                  description: The URL associated with the license.
              description: If available, the citation details describing the associated license and its location.
          required:
          - filtered
          - detected
          description: A detection result that describes a match against licensed code or other protected source material.
        ungrounded_material:
          $ref: '#/components/schemas/AzureContentFilterCompletionTextSpanDetectionResult'
        personally_identifiable_information:
          allOf:
          - $ref: '#/components/schemas/AzureContentFilterPersonallyIdentifiableInformationResult'
          description: A detection result that describes matches against Personal Identifiable Information with configurable subcategories.
      description: A content filter result for a single response item produced by a generative AI system.
    AzureContentFilterResultForPrompt:
      type: object
      properties:
        prompt_index:
          type: integer
          format: int32
          description: The index of the input prompt associated with the accompanying content filter result categories.
        content_filter_results:
          type: object
          properties:
            sexual:
              allOf:
              - $ref: '#/components/schemas/AzureContentFilterSeverityResult'
              description: |-
                A content filter category for language related to anatomical organs and genitals, romantic relationships, acts
                portrayed in erotic or affectionate terms, pregnancy, physical sexual acts, including those portrayed as an
                assault or a forced sexual violent act against one's will, prostitution, pornography, and abuse.
            hate:
              allOf:
              - $ref: '#/components/schemas/AzureContentFilterSeverityResult'
              description: |-
                A content filter category that can refer to any content that attacks or uses pejorative or discriminatory
                language with reference to a person or identity group based on certain differentiating attributes of these groups
                including but not limited to race, ethnicity, nationality, gender identity and expression, sexual orientation,
                religion, immigration status, ability status, personal appearance, and body size.
            violence:
              allOf:
              - $ref: '#/components/schemas/AzureContentFilterSeverityResult'
              description: |-
                A content filter category for language related to physical actions intended to hurt, injure, damage, or kill
                someone or something; describes weapons, guns and related entities, such as manufactures, associations,
                legislation, and so on.
            self_harm:
              allOf:
              - $ref: '#/components/schemas/AzureContentFilterSeverityResult'
              description: |-
                A content filter category that describes language related to physical actions intended to purposely hurt, injure,
                damage one's body or kill oneself.
            profanity:
              allOf:
              - $ref: '#/components/schemas/AzureContentFilterDetectionResult'
              description: |-
                A detection result that identifies whether crude, vulgar, or otherwise objection language is present in the
                content.
            custom_blocklists:
              allOf:
              - $ref: '#/components/schemas/AzureContentFilterBlocklistResult'
              description: A collection of binary filtering outcomes for configured custom blocklists.
            custom_topics:
              allOf:
              - $ref: '#/components/schemas/AzureContentFilterCustomTopicResult'
              description: A collection of binary filtering outcomes for configured custom topics.
            error:
              type: object
              properties:
                code:
                  type: integer
                  format: int32
                  description: A distinct, machine-readable code associated with the error.
                message:
                  type: string
                  description: A human-readable message associated with the error.
              required:
              - code
              - message
              description: If present, details about an error that prevented content filtering from completing its evaluation.
            jailbreak:
              allOf:
              - $ref: '#/components/schemas/AzureContentFilterDetectionResult'
              description: |-
                A detection result that describes user prompt injection attacks, where malicious users deliberately exploit
                system vulnerabilities to elicit unauthorized behavior from the LLM. This could lead to inappropriate content
                generation or violations of system-imposed restrictions.
            indirect_attack:
              allOf:
              - $ref: '#/components/schemas/AzureContentFilterDetectionResult'
              description: |-
                A detection result that describes attacks on systems powered by Generative AI models that can happen every time
                an application processes information that wasn’t directly authored by either the developer of the application or
                the user.
          required:
          - jailbreak
          - indirect_attack
          description: The content filter category details for the result.
      description: A content filter result associated with a single input prompt item into a generative AI system.
    AzureContentFilterSeverityResult:
      type: object
      required:
      - filtered
      - severity
      properties:
        filtered:
          type: boolean
          description: Whether the content severity resulted in a content filtering action.
        severity:
          type: string
          enum:
          - safe
          - low
          - medium
          - high
          description: The labeled severity of the content.
      description: |-
        A labeled content filter result item that indicates whether the content was filtered and what the qualitative
        severity level of the content was, as evaluated against content filter configuration for the category.
    AzurePiiSubCategoryResult:
      type: object
      required:
      - sub_category
      - filtered
      - detected
      - redacted
      properties:
        sub_category:
          type: string
          description: The PIIHarmSubCategory that was evaluated.
        filtered:
          type: boolean
          description: Whether the content detection resulted in a content filtering action for this subcategory.
        detected:
          type: boolean
          description: Whether the labeled content subcategory was detected in the content.
        redacted:
          type: boolean
          description: Whether the content was redacted for this subcategory.
      description: Result details for individual PIIHarmSubCategory(s).
    AzureUserSecurityContext:
      type: object
      properties:
        application_name:
          type: string
          description: The name of the application. Sensitive personal information should not be included in this field.
        end_user_id:
          type: string
          description: This identifier is the Microsoft Entra ID (formerly Azure Active Directory) user object ID used to authenticate end-users within the generative AI application. Sensitive personal information should not be included in this field.
        end_user_tenant_id:
          type: string
          description: The Microsoft 365 tenant ID the end user belongs to. It's required when the generative AI application is multitenant.
        source_ip:
          type: string
          description: Captures the original client's IP address.
      description: User security context contains several parameters that describe the application itself, and the end user that interacts with the application. These fields assist your security operations teams to investigate and mitigate security incidents by providing a comprehensive approach to protecting your AI applications. [Learn more](https://aka.ms/TP4AI/Documentation/EndUserContext) about protecting AI applications using Microsoft Defender for Cloud.
    OpenAI.ChatCompletionAllowedTools:
      type: object
      required:
      - mode
      - tools
      properties:
        mode:
          type: string
          enum:
          - auto
          - required
          description: |-
            Constrains the tools available to the model to a pre-defined set.
              `auto` allows the model to pick from among the allowed tools and generate a
              message.
              `required` requires the model to call one or more of the allowed tools.
